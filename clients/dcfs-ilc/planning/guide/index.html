<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Transformation Framework — Krasan Consulting Services</title>
  <link rel="icon" type="image/png" href="public/logo.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --theme-color: #0f3460;
      --sidebar-width: 280px;
      --sidebar-nav-link-color--active: #e94560;
      --sidebar-name-color: #0f3460;
      --sidebar-name-font-weight: 700;
      --cover-background-color: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    .sidebar-nav > ul > li > a { font-weight: 600; }
    .app-name-link img { max-width: 160px; }
    .markdown-section h1 { color: #0f3460; }
    .markdown-section h2 { color: #16213e; border-bottom: 2px solid #e94560; padding-bottom: 4px; }
    .markdown-section table { font-size: 14px; }
    .markdown-section table th { background: #0f3460; color: white; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '<img src="public/logo.png" alt="Krasan"> AI Transformation Framework',
      repo: false,
      loadSidebar: true,
      subMaxLevel: 2,
      search: {
        placeholder: 'Search the guide...',
        noData: 'No results',
        depth: 3
      },
      auto2top: true,
      coverpage: false,
      themeColor: '#0f3460',
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
