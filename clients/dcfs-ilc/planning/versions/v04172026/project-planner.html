<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCFS ILC — AI Transformation Project Planner</title>
<link rel="icon" type="image/png" href="../assets/krasan-favicon.png">
<style>
  :root { --accent: #0f3460; --highlight: #e94560; --green: #27ae60; --amber: #f39c12; --blue: #2980b9; --red: #e74c3c; --gray: #95a5a6; --light: #f8f9fa; --border: #dee2e6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }

  /* Header */
  .header { background: var(--accent); color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .actions { display: flex; gap: 8px; }
  .header button { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .header button:hover { background: rgba(255,255,255,0.25); }
  .header .version { font-size: 11px; color: rgba(255,255,255,0.6); }

  /* Tabs */
  .tabs { display: flex; background: white; border-bottom: 2px solid var(--border); padding: 0 24px; }
  .tab { padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; color: #666; }
  .tab:hover { color: var(--accent); }
  .tab.active { color: var(--accent); border-bottom-color: var(--highlight); }
  .tab .count { background: var(--highlight); color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }

  /* Content */
  .content { padding: 16px 24px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Gantt */
  .gantt-controls { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .gantt-controls button { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .gantt-controls button:hover { opacity: 0.9; }
  .gantt-controls select, .gantt-controls input { padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }

  .gantt-container { overflow-x: auto; background: white; border: 1px solid var(--border); border-radius: 6px; }
  .gantt-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .gantt-table th { background: var(--accent); color: white; padding: 6px 8px; text-align: left; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
  .gantt-table td { padding: 4px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
  .gantt-table tr:hover { background: #f8f9ff; }
  .gantt-table .wbs-id { font-weight: 600; color: var(--accent); width: 60px; }
  .gantt-table .task-name { min-width: 300px; }
  .gantt-table .task-name.phase { font-weight: 700; background: #f0f4ff; }
  .collapse-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--accent); padding: 0 4px; }
  .gantt-table tr.collapsed-child { display: none; }
  .dep-tag { font-size: 9px; background: #e3f2fd; color: var(--blue); padding: 1px 5px; border-radius: 8px; margin-left: 4px; white-space: nowrap; }
  .col-effort { display: none; }
  .show-effort .col-effort { display: table-cell; }
  .gantt-table input[type="text"], .gantt-table input[type="date"], .gantt-table select { width: 100%; padding: 3px 5px; border: 1px solid transparent; border-radius: 3px; font-size: 12px; background: transparent; }
  .gantt-table input:focus, .gantt-table select:focus { border-color: var(--accent); background: white; outline: none; }
  .gantt-table textarea { width: 100%; padding: 3px 5px; border: 1px solid transparent; border-radius: 3px; font-size: 11px; resize: vertical; min-height: 20px; background: transparent; }
  .gantt-table textarea:focus { border-color: var(--accent); background: white; outline: none; }

  /* Gantt bars */
  .gantt-bar-cell { position: relative; height: 24px; }
  .gantt-bar { position: absolute; height: 18px; top: 3px; border-radius: 3px; font-size: 9px; color: white; display: flex; align-items: center; padding-left: 4px; min-width: 4px; }
  .gantt-bar.govern { background: var(--accent); }
  .gantt-bar.baseline { background: var(--blue); }
  .gantt-bar.design { background: #8e44ad; }
  .gantt-bar.train { background: var(--amber); }
  .gantt-bar.pilot { background: var(--green); }
  .gantt-bar.measure { background: var(--highlight); }
  .gantt-bar.playbook { background: #16a085; }
  .gantt-bar.scale { background: var(--gray); }
  .gantt-bar.default { background: var(--blue); }

  /* Timeline header */
  .timeline-header { display: flex; }
  .timeline-week { flex: 1; text-align: center; font-size: 10px; padding: 2px; border-left: 1px solid rgba(255,255,255,0.2); min-width: 40px; }

  /* Status badges */
  .status { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .status.not-started { background: #eee; color: #666; }
  .status.in-progress { background: #e3f2fd; color: var(--blue); }
  .status.completed { background: #e8f5e9; color: var(--green); }
  .status.blocked { background: #fce4ec; color: var(--red); }
  .gantt-table td select { min-width: 95px; }

  /* Delete button */
  .btn-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .btn-delete:hover { color: var(--red); }

  /* Risk & Assumptions tables */
  .log-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .log-table th { background: var(--accent); color: white; padding: 8px 12px; text-align: left; font-size: 12px; }
  .log-table td { padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 12px; }
  .log-table tr:hover { background: #f8f9ff; }
  .log-table input, .log-table select, .log-table textarea { width: 100%; padding: 4px 6px; border: 1px solid transparent; border-radius: 3px; font-size: 12px; background: transparent; }
  .log-table input:focus, .log-table select:focus, .log-table textarea:focus { border-color: var(--accent); background: white; outline: none; }

  .severity-critical { color: var(--red); font-weight: 700; }
  .severity-high { color: var(--amber); font-weight: 600; }
  .severity-medium { color: var(--blue); }
  .severity-low { color: var(--gray); }

  .add-row { margin-top: 8px; }
  .add-row button { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }

  /* Notes panel */
  .notes-panel { position: fixed; right: 0; top: 0; width: 360px; height: 100vh; background: white; box-shadow: -4px 0 12px rgba(0,0,0,0.1); z-index: 100; transform: translateX(100%); transition: transform 0.2s; padding: 16px; overflow-y: auto; }
  .notes-panel.open { transform: translateX(0); }
  .notes-panel h3 { margin-bottom: 12px; color: var(--accent); }
  .notes-panel textarea { width: 100%; height: 200px; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; resize: vertical; }
  .notes-panel .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }

  /* Save indicator */
  .save-indicator { font-size: 11px; color: rgba(255,255,255,0.5); }
  .save-indicator.saved { color: var(--green); }

  @media print { .header, .tabs, .gantt-controls, .add-row, .btn-delete, .notes-panel { display: none !important; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>DCFS ILC — AI Transformation Project Planner</h1>
    <div class="version">V04172026 · Krasan Consulting Services</div>
  </div>
  <div class="actions">
    <span class="save-indicator" id="save-indicator">Auto-saved</span>
    <button onclick="resetData()" style="background:var(--highlight)">Reset to Default</button>
    <button onclick="exportJSON()">Export JSON</button>
    <button onclick="exportMSProjectXML()">Export MS Project</button>
    <button onclick="exportExcel()">Export CSV</button>
    <button onclick="importJSON()">Import JSON</button>
    <button onclick="window.print()">Print</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('gantt')">Gantt / WBS</div>
  <div class="tab" onclick="switchTab('risks')">Risks <span class="count" id="risk-count">0</span></div>
  <div class="tab" onclick="switchTab('assumptions')">Assumptions <span class="count" id="assumption-count">0</span></div>
</div>

<div class="content">
  <!-- GANTT PANEL -->
  <div class="panel active" id="panel-gantt">
    <div class="gantt-controls">
      <button onclick="addTask()">+ Add Task</button>
      <button onclick="addPhase()">+ Add Phase</button>
      <select id="phase-filter" onchange="renderGantt()">
        <option value="all">All Phases</option>
        <option value="govern">Govern</option>
        <option value="baseline">Baseline</option>
        <option value="design">Design</option>
        <option value="train">Train</option>
        <option value="pilot">Pilot</option>
        <option value="measure">Measure</option>
        <option value="playbook">Playbook</option>
        <option value="scale">Scale</option>
      </select>
      <button onclick="toggleEffort()" id="effort-toggle" style="background:rgba(255,255,255,0.15);border:1px solid var(--border);">Show Effort</button>
      <span style="color:#999;font-size:11px;">Click task name for notes</span>
    </div>
    <div class="gantt-container">
      <table class="gantt-table" id="gantt-table">
        <thead id="gantt-header"></thead>
        <tbody id="gantt-body"></tbody>
      </table>
    </div>
  </div>

  <!-- RISKS PANEL -->
  <div class="panel" id="panel-risks">
    <div class="add-row"><button onclick="addRisk()">+ Add Risk</button></div>
    <br>
    <table class="log-table">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>Risk Description</th>
          <th style="width:100px">Likelihood</th>
          <th style="width:100px">Impact</th>
          <th style="width:80px">Score</th>
          <th>Mitigation</th>
          <th style="width:100px">Owner</th>
          <th style="width:90px">Status</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody id="risks-body"></tbody>
    </table>
  </div>

  <!-- ASSUMPTIONS PANEL -->
  <div class="panel" id="panel-assumptions">
    <div class="add-row"><button onclick="addAssumption()">+ Add Assumption</button></div>
    <br>
    <table class="log-table">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>Assumption</th>
          <th style="width:120px">Status</th>
          <th>How to Validate</th>
          <th style="width:100px">Owner</th>
          <th>Notes</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody id="assumptions-body"></tbody>
    </table>
  </div>
</div>

<!-- Notes Side Panel -->
<div class="notes-panel" id="notes-panel">
  <button class="close-btn" onclick="closeNotes()">&times;</button>
  <h3 id="notes-title">Task Notes</h3>
  <textarea id="notes-text" onchange="saveNotes()"></textarea>
</div>

<input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)">

<script>
// ── Data Store ──
const STORAGE_KEY = 'dcfs-ilc-project-planner';
const DATA_VERSION = 26;  // Bump this when defaults change — auto-refreshes browser data
const PROJECT_START = new Date('2026-04-14');
const WEEKS_TO_SHOW = 26;

let data = loadData();

function getDefaultData() {
  return {
    _version: DATA_VERSION,
    tasks: [
      // ── PHASE 1: GOVERN ──
      { id: 'P1', wbs: '1', name: 'GOVERN', phase: 'govern', isPhase: true, start: '2026-04-14', end: '2026-05-04', status: 'in-progress', owner: 'Vinay', notes: 'Align with DoIT AI Policy & NIST AI RMF, define guardrails, confirm tool access. Deliverables: DoIT Compliance Map, NIST AI RMF Framework, Governance Structure Proposal, Code Generation Policy, Tool Authorization List, DCFS Guardrails Document.' },
      { id: 't1', wbs: '1.1', name: 'DoIT AI Policy review — all 12 sections mapped', phase: 'govern', start: '2026-04-14', end: '2026-04-18', status: 'in-progress', owner: 'Vinay', notes: 'Deliverable: DoIT Compliance Map (12-section matrix with compliance status per section).' },
      { id: 't2', wbs: '1.2', name: 'NIST AI RMF governance framework', phase: 'govern', start: '2026-04-14', end: '2026-04-18', status: 'in-progress', owner: 'Vinay', notes: 'Deliverable: NIST AI RMF Governance Framework document (GOVERN/MAP/MEASURE/MANAGE functions mapped to ILC context).' },
      { id: 't3', wbs: '1.3', name: 'Governance structure proposal (draft)', phase: 'govern', start: '2026-04-14', end: '2026-04-18', status: 'in-progress', owner: 'Vinay', notes: 'Deliverable: Governance Structure Proposal — two-phase model (Pilot Governance Team → Full AI Governance Team), roles, authority, cadence.' },
      { id: 't3b', wbs: '1.4', name: 'Governance structure proposal — approval', phase: 'govern', start: '2026-04-18', end: '2026-04-25', status: 'not-started', owner: 'Dave', notes: 'Deliverable: Approved governance structure (email confirmation or meeting minutes). Required before governance team can be established.', depends: '1.3' },
      { id: 't4', wbs: '1.5', name: 'Resolve Section 5e — State data interpretation', phase: 'govern', start: '2026-04-14', end: '2026-04-25', status: 'blocked', owner: 'Dave', notes: 'Blocker: Does Copilot on ILC code = "State data for AI"? Deliverable: Written determination from DCFS on Section 5e applicability.', depends: '' },
      { id: 't5', wbs: '1.6', name: 'Resolve Section 5f — DoIT 30-day notice status', phase: 'govern', start: '2026-04-14', end: '2026-04-25', status: 'blocked', owner: 'Dave', notes: 'Blocker: Has assessment been filed? 30-day gate if not. Deliverable: DoIT Assessment filing confirmation or filing + 30-day timeline.', depends: '' },
      { id: 't6', wbs: '1.7', name: 'Confirm Copilot deployment status & tier', phase: 'govern', start: '2026-04-14', end: '2026-04-21', status: 'blocked', owner: 'Dave', notes: 'Business/Enterprise tier? Deployed to ILC teams? Deliverable: Copilot deployment confirmation (tier, license count, team access status).', depends: '' },
      { id: 't7', wbs: '1.8', name: 'Gartner consultation (Jim request)', phase: 'govern', start: '2026-04-21', end: '2026-05-02', status: 'not-started', owner: 'Dave/Jim', notes: 'Deliverable: Gartner advisory findings/recommendations summary.' },
      { id: 't8', wbs: '1.9', name: 'Establish governance team (DCFS-led)', phase: 'govern', start: '2026-04-21', end: '2026-04-30', status: 'not-started', owner: 'Dave', notes: 'DCFS governs, Krasan executes. Deliverable: Named governance team roster with roles and authority. (See also 9.1 — CIO designates Pilot Governance Lead; 1.9 is Vinay preparing, 9.1 is DCFS acting.)', depends: '1.4' },
      { id: 't9', wbs: '1.10', name: 'Code generation policy review', phase: 'govern', start: '2026-04-14', end: '2026-04-18', status: 'completed', owner: 'Vinay', notes: 'DoIT does NOT prohibit code gen. Human-in-the-loop required. Deliverable: Code Generation Policy document (permissibility analysis, guardrails, stair-step approach).' },
      { id: 't10', wbs: '1.11', name: 'Tool authorization list', phase: 'govern', start: '2026-04-14', end: '2026-04-18', status: 'completed', owner: 'Vinay', notes: 'Copilot multi-model (OpenAI approved, Gemini pending, Claude TBD). Deliverable: Approved Tool Authorization List (tool, vendor, model, approval status, restrictions).' },
      { id: 't10b', wbs: '1.12', name: 'DCFS AI guardrails document', phase: 'govern', start: '2026-04-14', end: '2026-04-25', status: 'in-progress', owner: 'Vinay', notes: 'Deliverable: DCFS Guardrails Document — data boundaries (no PII, no CANTS, no security docs), human-in-the-loop rules, regulatory mapping (HIPAA, FERPA, 42 CFR Part 2, CCWIS).', depends: '1.5' },
      { id: 't10d', wbs: '1.13', name: 'PMO BA assignment — in/out decision', phase: 'govern', start: '2026-04-21', end: '2026-04-24', status: 'not-started', owner: 'Romi/Alec', notes: 'Confirm with CSG whether PMO (Valerie Hutton) participates in the pilot. If IN: roster expands to person #7, story-QA bottleneck relief remains in pilot scope. If OUT: PMO role design moves to WBS 8.2a (Scale). Deliverable: Decision documented; roster and WBS 8.2a updated accordingly.' },
      { id: 't10e', wbs: '1.14', name: 'Create a Scope Document', phase: 'govern', start: '2026-04-17', end: '2026-04-22', status: 'not-started', owner: 'Vinay/Alec', notes: 'AI Transformation Leader drives content (AI scope, methodology, metrics). Project Manager tracks delivery and readiness for 1.15 meeting. Deliverable: docs/dcfs-ilc-pilot-scope.md finalized for Pilot Plan Approval meeting.' },
      { id: 't10f', wbs: '1.15', name: 'Pilot plan approval', phase: 'govern', start: '2026-04-22', end: '2026-04-27', status: 'not-started', owner: 'Romi/Alec/Vinay', notes: 'Delivery Lead runs the meeting with Client Governance Lead. Project Manager schedules and owns agenda logistics + minutes. AI Transformation Leader presents scope and metrics content. Agenda: Scope, Notice, Tools, Project Plan, Gartner (Do we?), Metrics baseline, Pair Programming. Deliverable: Meeting minutes with decisions captured; baseline metrics agreed.', depends: '1.12,1.13,1.14' },
      { id: 't10c', wbs: '1.16', name: 'Governance sign-off — approve package for Pilot', phase: 'govern', start: '2026-04-28', end: '2026-05-04', status: 'not-started', owner: 'Dave', notes: 'Gate before Pilot (not Baseline). All blockers resolved, governance team named, guardrails approved. Deliverable: Signed governance approval (email or meeting minutes) authorizing Pilot phase to proceed.', depends: '1.5,1.6,1.7,1.9,1.12,1.15' },

      // ── PHASE 2: BASELINE ──
      { id: 'P2', wbs: '2', name: 'BASELINE', phase: 'baseline', isPhase: true, start: '2026-04-21', end: '2026-05-14', status: 'not-started', owner: 'Vinay', notes: 'Capture current metrics, readiness assessment, select pilot teams. Starts after Govern research tasks (1.1, 1.10, 1.11) provide sufficient policy/tool understanding. Deliverables: AI Readiness Assessment results, JIRA baseline analysis, SPACE/DevEx survey results, pilot team selection rationale, Baseline Metrics Report (approved).', depends: '1.1,1.10,1.11' },
      { id: 't11', wbs: '2.1', name: 'Readiness assessment — build tool', phase: 'baseline', start: '2026-04-21', end: '2026-04-24', status: 'not-started', owner: 'Vinay', notes: 'Collect information, develop assessment in tools.ussp.co, internal review. Deliverable: Working readiness assessment tool (23 questions covering skills, process, attitudes, infrastructure).', depends: '1.1,1.10,1.11' },
      { id: 't11a', wbs: '2.2', name: 'Convert assessment tool to Excel', phase: 'baseline', start: '2026-04-25', end: '2026-04-25', status: 'not-started', owner: 'Vinay', notes: 'Export the readiness assessment (from tools.ussp.co) to an Excel workbook for distribution and review. Deliverable: Readiness assessment Excel workbook.', depends: '2.1' },
      { id: 't11b', wbs: '2.3', name: 'Readiness assessment — client review', phase: 'baseline', start: '2026-04-24', end: '2026-04-28', status: 'not-started', owner: 'Romi/Vinay', notes: 'Delivery Lead owns client-facing submission. AI Transformation Leader prepares materials. Present to Dave/Jim — review questions, distribution method, audience, messaging. Deliverable: Client feedback on assessment (approved, modified, or rejected questions).', depends: '2.1,2.2' },
      { id: 't11c', wbs: '2.4', name: 'Readiness assessment — incorporate feedback & distribute', phase: 'baseline', start: '2026-04-28', end: '2026-04-29', status: 'not-started', owner: 'Vinay', notes: 'Iterate on feedback, finalize, send to teams. Deliverable: Finalized assessment distributed to all 12 teams.', depends: '2.3' },
      { id: 't11d', wbs: '2.5', name: 'Readiness assessment — collect responses', phase: 'baseline', start: '2026-04-29', end: '2026-05-02', status: 'not-started', owner: 'Vinay', notes: 'Buffer for 12 teams to respond. Follow up as needed. Deliverable: Completed responses from all teams.', depends: '2.4' },
      { id: 't14', wbs: '2.6', name: 'Analyze readiness results — identify gaps', phase: 'baseline', start: '2026-05-02', end: '2026-05-05', status: 'not-started', owner: 'Vinay', notes: 'Deliverable: Readiness analysis report — per-team scores, gap identification, risk areas.', depends: '2.5' },
      { id: 't12', wbs: '2.7', name: 'JIRA baseline — request access & define metrics', phase: 'baseline', start: '2026-04-21', end: '2026-04-23', status: 'not-started', owner: 'Vinay/Matt', notes: 'Get JIRA access from Matt, define what to pull (velocity, cycle time, defect rate). Deliverable: JIRA access confirmed, metrics definition document.', depends: '1.7' },
      { id: 't12b', wbs: '2.8', name: 'JIRA baseline — extract & analyze (last 3 sprints)', phase: 'baseline', start: '2026-04-23', end: '2026-04-28', status: 'not-started', owner: 'Matt', notes: 'Matt owns assessment of JIRA measurements (RTE has native JIRA access + sprint context). Deliverable: JIRA baseline analysis (velocity trends, cycle time, defect rates per team).', depends: '2.7' },
      { id: 't13', wbs: '2.9', name: 'SPACE/DevEx survey — design & review', phase: 'baseline', start: '2026-04-28', end: '2026-04-30', status: 'not-started', owner: 'Vinay', notes: 'Lighter prep than readiness assessment. Deliverable: SPACE/DevEx survey ready for distribution.', depends: '2.6' },
      { id: 't13b', wbs: '2.10', name: 'SPACE/DevEx survey — distribute & collect', phase: 'baseline', start: '2026-04-30', end: '2026-05-05', status: 'not-started', owner: 'Vinay', notes: 'Pilot candidates only. Deliverable: Completed SPACE/DevEx responses.', depends: '2.9' },
      { id: 't15', wbs: '2.11', name: 'Select 1 pilot team (Krasan roles only)', phase: 'baseline', start: '2026-05-05', end: '2026-05-07', status: 'completed', owner: 'Romi/John', notes: 'Team selected: Intact (single-team pilot). Pilot reduced to 4 roles / 6 people. Non-piloted roles (Config, SM, PMO) deferred to Phase 8 (WBS 8.2a). Rationale: cleaner measurement signal, protects coaching bandwidth, shorter design phase. Deliverable: Pilot team + role selection rationale (captured in docs/dcfs-ilc-pilot-scope.md §3).', depends: '2.6,2.8' },
      { id: 't16', wbs: '2.12', name: 'Baseline metrics report', phase: 'baseline', start: '2026-05-07', end: '2026-05-11', status: 'not-started', owner: 'Vinay', notes: 'Consolidate all baseline data into single report. Deliverable: Baseline Metrics Report (readiness scores, JIRA metrics, SPACE/DevEx results, pilot team selection, identified gaps).', depends: '2.8,2.10,2.11' },

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (parsed._version === DATA_VERSION) return parsed;
      // Version mismatch — code has newer defaults, auto-refresh
      console.log(`Planner data updated: v${parsed._version || 1} → v${DATA_VERSION}`);
    }
  } catch(e) {}
  return getDefaultData();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  const el = document.getElementById('save-indicator');
  el.textContent = 'Saved ✓';
  el.className = 'save-indicator saved';
  setTimeout(() => { el.textContent = 'Auto-saved'; el.className = 'save-indicator'; }, 2000);
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['gantt','risks','assumptions'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── Gantt Rendering ──
function getWeekDates() {
  const weeks = [];
  for (let i = 0; i < WEEKS_TO_SHOW; i++) {
    const d = new Date(PROJECT_START);
    d.setDate(d.getDate() + i * 7);
    weeks.push(d);
  }
  return weeks;
}

function daysBetween(d1, d2) {
  return Math.round((new Date(d2) - new Date(d1)) / (1000*60*60*24));
}

// Track collapsed phases — default to all phases collapsed on first load
if (!data.collapsedPhases) {
  data.collapsedPhases = {};
  data.tasks.forEach(t => { if (t.isPhase) data.collapsedPhases[t.id] = true; });
}

function toggleCollapse(phaseId) {
  data.collapsedPhases[phaseId] = !data.collapsedPhases[phaseId];
  saveData();
  renderGantt();
}

function getTaskOptions(excludeId) {
  return data.tasks.filter(t => t.id !== excludeId && !t.isPhase)
    .map(t => `<option value="${t.wbs}">${t.wbs}</option>`).join('');
}

function renderGantt() {
  const weeks = getWeekDates();
  const totalDays = WEEKS_TO_SHOW * 7;
  const filter = document.getElementById('phase-filter').value;

  // Header
  const header = document.getElementById('gantt-header');
  header.innerHTML = `<tr>
    <th style="width:50px">WBS</th>
    <th style="width:220px">Task</th>
    <th style="width:90px">Start</th>
    <th style="width:90px">End</th>
    <th style="width:70px">Depends</th>
    <th style="width:80px">Owner</th>
    <th class="col-effort" style="width:60px">Effort</th>
    <th style="width:80px">Status</th>
    <th style="min-width:${WEEKS_TO_SHOW * 40}px">
      <div class="timeline-header">${weeks.map(w => `<div class="timeline-week">${(w.getMonth()+1)}/${w.getDate()}</div>`).join('')}</div>
    </th>
    <th style="width:30px"></th>
  </tr>`;

  // Body
  const body = document.getElementById('gantt-body');
  body.innerHTML = '';
  const filteredTasks = filter === 'all' ? data.tasks : data.tasks.filter(t => t.phase === filter || t.isPhase);

  let currentPhaseId = null;

  filteredTasks.forEach((task, idx) => {
    // Track which phase we're in
    if (task.isPhase) currentPhaseId = task.id;
    const isChild = !task.isPhase;
    const isCollapsed = isChild && currentPhaseId && data.collapsedPhases[currentPhaseId];

    const tr = document.createElement('tr');
    if (isCollapsed) tr.classList.add('collapsed-child');

    const startDay = Math.max(0, daysBetween(PROJECT_START, task.start));
    const duration = Math.max(1, daysBetween(task.start, task.end));
    const barLeft = (startDay / totalDays) * 100;
    const barWidth = (duration / totalDays) * 100;
    const barClass = task.phase || 'default';

    // Collapse button for phases
    const collapseBtn = task.isPhase
      ? `<button class="collapse-btn" onclick="event.stopPropagation();toggleCollapse('${task.id}')" title="Collapse/Expand">${data.collapsedPhases[task.id] ? '▶' : '▼'}</button>`
      : '';

    // Dependencies display
    const depDisplay = task.depends
      ? `<span class="dep-tag">${task.depends}</span>`
      : '';

    tr.innerHTML = `
      <td class="wbs-id">${task.wbs}</td>
      <td class="task-name ${task.isPhase ? 'phase' : ''}" style="cursor:pointer" onclick="openNotes('${task.id}')">
        ${collapseBtn}
        <input type="text" value="${task.name}" onchange="updateTask('${task.id}','name',this.value)" style="${task.isPhase ? 'font-weight:700' : ''}; ${task.isPhase ? 'width:calc(100% - 24px);display:inline' : 'width:100%'}">
      </td>
      <td><input type="date" value="${task.start}" onchange="updateTask('${task.id}','start',this.value)"></td>
      <td><input type="date" value="${task.end}" onchange="updateTask('${task.id}','end',this.value)"></td>
      <td>${task.isPhase ? '' : `<input type="text" value="${task.depends||''}" onchange="updateTask('${task.id}','depends',this.value)" placeholder="e.g. 1.4" style="width:50px;font-size:11px" title="Enter WBS # of dependency">`}${depDisplay}</td>
      <td><input type="text" value="${task.owner}" onchange="updateTask('${task.id}','owner',this.value)" style="width:70px"></td>
      <td class="col-effort"><input type="text" value="${task.effort||''}" onchange="updateTask('${task.id}','effort',this.value)" placeholder="" style="width:50px;font-size:11px;text-align:center"></td>
      <td>
        <select onchange="updateTask('${task.id}','status',this.value)">
          <option value="not-started" ${task.status==='not-started'?'selected':''}>Not Started</option>
          <option value="in-progress" ${task.status==='in-progress'?'selected':''}>In Progress</option>
          <option value="completed" ${task.status==='completed'?'selected':''}>Completed</option>
          <option value="blocked" ${task.status==='blocked'?'selected':''}>Blocked</option>
        </select>
      </td>
      <td class="gantt-bar-cell" style="min-width:${WEEKS_TO_SHOW * 40}px; position:relative;">
        <div class="gantt-bar ${barClass}" style="left:${barLeft}%;width:${barWidth}%;" title="${task.name}: ${task.start} → ${task.end}${task.depends ? ' (depends on ' + task.depends + ')' : ''}"></div>
      </td>
      <td><button class="btn-delete" onclick="deleteTask('${task.id}')" title="Remove">&times;</button></td>
    `;
    body.appendChild(tr);
  });
}

function updateTask(id, field, value) {
  const task = data.tasks.find(t => t.id === id);
  if (task) { task[field] = value; saveData(); renderGantt(); }
}

function addTask() {
  const maxNum = data.tasks.filter(t => !t.isPhase).length + 1;
  data.tasks.push({
    id: 't' + Date.now(),
    wbs: '?.?',
    name: 'New Task',
    phase: 'govern',
    start: '2026-04-14',
    end: '2026-04-21',
    status: 'not-started',
    owner: '',
    notes: ''
  });
  saveData(); renderGantt();
}

function addPhase() {
  data.tasks.push({
    id: 'P' + Date.now(),
    wbs: '?',
    name: 'NEW PHASE',
    phase: 'govern',
    isPhase: true,
    start: '2026-04-14',
    end: '2026-04-21',
    status: 'not-started',
    owner: '',
    notes: ''
  });
  saveData(); renderGantt();
}

function deleteTask(id) {
  if (confirm('Remove this task?')) {
    data.tasks = data.tasks.filter(t => t.id !== id);
    saveData(); renderGantt();
  }
}

// ── Notes ──
let currentNotesId = null;
function openNotes(id) {
  currentNotesId = id;
  const task = data.tasks.find(t => t.id === id);
  if (!task) return;
  document.getElementById('notes-title').textContent = task.wbs + ' — ' + task.name;
  document.getElementById('notes-text').value = task.notes || '';
  document.getElementById('notes-panel').classList.add('open');
}
function closeNotes() { document.getElementById('notes-panel').classList.remove('open'); }
function saveNotes() {
  if (!currentNotesId) return;
  const task = data.tasks.find(t => t.id === currentNotesId);
  if (task) { task.notes = document.getElementById('notes-text').value; saveData(); }
}

// ── Risks ──
function renderRisks() {
  const body = document.getElementById('risks-body');
  body.innerHTML = '';
  document.getElementById('risk-count').textContent = data.risks.length;

  data.risks.forEach((r, i) => {
    const score = getLikelihoodNum(r.likelihood) * getImpactNum(r.impact);
    const scoreClass = score >= 15 ? 'severity-critical' : score >= 10 ? 'severity-high' : score >= 5 ? 'severity-medium' : 'severity-low';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600">${r.id}</td>
      <td><textarea onchange="updateRisk(${i},'desc',this.value)">${r.desc}</textarea></td>
      <td><select onchange="updateRisk(${i},'likelihood',this.value)">
        <option ${r.likelihood==='Low'?'selected':''}>Low</option>
        <option ${r.likelihood==='Medium'?'selected':''}>Medium</option>
        <option ${r.likelihood==='High'?'selected':''}>High</option>
        <option ${r.likelihood==='Unknown'?'selected':''}>Unknown</option>
      </select></td>
      <td><select onchange="updateRisk(${i},'impact',this.value)">
        <option ${r.impact==='Low'?'selected':''}>Low</option>
        <option ${r.impact==='Medium'?'selected':''}>Medium</option>
        <option ${r.impact==='High'?'selected':''}>High</option>
        <option ${r.impact==='Critical'?'selected':''}>Critical</option>
      </select></td>
      <td class="${scoreClass}" style="text-align:center;font-size:16px">${score}</td>
      <td><textarea onchange="updateRisk(${i},'mitigation',this.value)">${r.mitigation}</textarea></td>
      <td><input type="text" value="${r.owner}" onchange="updateRisk(${i},'owner',this.value)"></td>
      <td><select onchange="updateRisk(${i},'status',this.value)">
        <option ${r.status==='open'?'selected':''}>open</option>
        <option ${r.status==='mitigated'?'selected':''}>mitigated</option>
        <option ${r.status==='closed'?'selected':''}>closed</option>
        <option ${r.status==='accepted'?'selected':''}>accepted</option>
      </select></td>
      <td><button class="btn-delete" onclick="deleteRisk(${i})">&times;</button></td>
    `;
    body.appendChild(tr);
  });
}

function getLikelihoodNum(l) { return {Low:1,Medium:3,High:5,Unknown:3}[l]||3; }
function getImpactNum(i) { return {Low:1,Medium:3,High:5,Critical:7}[i]||3; }

function updateRisk(idx, field, value) { data.risks[idx][field] = value; saveData(); renderRisks(); }
function addRisk() {
  data.risks.push({ id: 'R' + (data.risks.length + 1).toString().padStart(2,'0'), desc: '', likelihood: 'Medium', impact: 'Medium', mitigation: '', owner: '', status: 'open' });
  saveData(); renderRisks();
}
function deleteRisk(idx) { if (confirm('Remove this risk?')) { data.risks.splice(idx, 1); saveData(); renderRisks(); } }

// ── Assumptions ──
function renderAssumptions() {
  const body = document.getElementById('assumptions-body');
  body.innerHTML = '';
  document.getElementById('assumption-count').textContent = data.assumptions.length;

  data.assumptions.forEach((a, i) => {
    const statusColors = { validated: 'color:var(--green)', unvalidated: 'color:var(--red)', pending: 'color:var(--amber)', assumed: 'color:var(--blue)', unknown: 'color:var(--gray)' };
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600">${a.id}</td>
      <td><textarea onchange="updateAssumption(${i},'desc',this.value)">${a.desc}</textarea></td>
      <td><select style="${statusColors[a.status]||''};font-weight:600" onchange="updateAssumption(${i},'status',this.value)">
        <option value="validated" ${a.status==='validated'?'selected':''}>Validated</option>
        <option value="unvalidated" ${a.status==='unvalidated'?'selected':''}>Unvalidated</option>
        <option value="pending" ${a.status==='pending'?'selected':''}>Pending</option>
        <option value="assumed" ${a.status==='assumed'?'selected':''}>Assumed</option>
        <option value="unknown" ${a.status==='unknown'?'selected':''}>Unknown</option>
      </select></td>
      <td><textarea onchange="updateAssumption(${i},'validate',this.value)">${a.validate}</textarea></td>
      <td><input type="text" value="${a.owner}" onchange="updateAssumption(${i},'owner',this.value)"></td>
      <td><textarea onchange="updateAssumption(${i},'notes',this.value)">${a.notes||''}</textarea></td>
      <td><button class="btn-delete" onclick="deleteAssumption(${i})">&times;</button></td>
    `;
    body.appendChild(tr);
  });
}

function updateAssumption(idx, field, value) { data.assumptions[idx][field] = value; saveData(); renderAssumptions(); }
function addAssumption() {
  data.assumptions.push({ id: 'A' + (data.assumptions.length + 1).toString().padStart(2,'0'), desc: '', status: 'assumed', validate: '', owner: '', notes: '' });
  saveData(); renderAssumptions();
}
function deleteAssumption(idx) { if (confirm('Remove this assumption?')) { data.assumptions.splice(idx, 1); saveData(); renderAssumptions(); } }

// ── Export / Import ──
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dcfs-ilc-planner-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function exportExcel() {
  var statusLabel = { 'not-started': 'Not Started', 'in-progress': 'In Progress', 'completed': 'Completed', 'blocked': 'Blocked' };
  function csvEsc(s) {
    s = (s||'').replace(/\r?\n/g, ' ');
    if (s.indexOf(',') !== -1 || s.indexOf('"') !== -1 || s.indexOf('\n') !== -1) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  }

  // WBS Tasks
  var lines = ['WBS,Task,Start,End,Depends,Owner,Effort,Status,Notes / Deliverables'];
  data.tasks.forEach(function(t) {
    lines.push([
      csvEsc(t.wbs), csvEsc(t.name), t.start, t.end,
      csvEsc(t.depends||''), csvEsc(t.owner), csvEsc(t.effort||''),
      csvEsc(statusLabel[t.status]||t.status), csvEsc(t.notes||'')
    ].join(','));
  });

  // Blank rows then Risks
  lines.push('');
  lines.push('');
  lines.push('RISK REGISTER');
  lines.push('ID,Risk,Likelihood,Impact,Mitigation,Owner,Status');
  data.risks.forEach(function(r) {
    lines.push([
      csvEsc(r.id), csvEsc(r.desc), csvEsc(r.likelihood), csvEsc(r.impact),
      csvEsc(r.mitigation), csvEsc(r.owner), csvEsc(r.status)
    ].join(','));
  });

  // Blank rows then Assumptions
  lines.push('');
  lines.push('');
  lines.push('ASSUMPTIONS LOG');
  lines.push('ID,Assumption,Status,Validation,Owner,Notes');
  data.assumptions.forEach(function(a) {
    lines.push([
      csvEsc(a.id), csvEsc(a.desc), csvEsc(a.status),
      csvEsc(a.validate), csvEsc(a.owner), csvEsc(a.notes||'')
    ].join(','));
  });

  var csv = '\ufeff' + lines.join('\r\n');
  var blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dcfs-ilc-planner-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function exportMSProjectXML() {
  // Build task UID map for dependency linking
  const uidMap = {};
  data.tasks.forEach((t, i) => { uidMap[t.wbs] = i + 1; });

  // Status to % complete
  const pctMap = { 'completed': 100, 'in-progress': 50, 'blocked': 25, 'not-started': 0 };

  let tasksXml = '';
  data.tasks.forEach((task, i) => {
    const uid = i + 1;
    const start = task.start + 'T08:00:00';
    const end = task.end + 'T17:00:00';
    const pct = pctMap[task.status] || 0;
    const outline = task.isPhase ? 1 : 2;
    const summary = task.isPhase ? 1 : 0;
    const name = task.name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    const notes = (task.notes || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const owner = (task.owner || '').replace(/&/g,'&amp;').replace(/</g,'&lt;');

    // Parse dependencies
    let predXml = '';
    if (task.depends) {
      task.depends.split(',').forEach(dep => {
        const depWbs = dep.trim();
        if (uidMap[depWbs]) {
          predXml += `
        <PredecessorLink>
          <PredecessorUID>${uidMap[depWbs]}</PredecessorUID>
          <Type>1</Type>
        </PredecessorLink>`;
        }
      });
    }

    tasksXml += `
    <Task>
      <UID>${uid}</UID>
      <ID>${uid}</ID>
      <Name>${name}</Name>
      <WBS>${task.wbs}</WBS>
      <OutlineLevel>${outline}</OutlineLevel>
      <Summary>${summary}</Summary>
      <Start>${start}</Start>
      <Finish>${end}</Finish>
      <PercentComplete>${pct}</PercentComplete>
      <Notes>${notes}</Notes>
      <ResourceNames>${owner}</ResourceNames>${predXml}
    </Task>`;
  });

  const xml = `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Project xmlns="http://schemas.microsoft.com/project">
  <Name>DCFS ILC — AI Transformation Project</Name>
  <StartDate>${PROJECT_START.toISOString().slice(0,10)}T08:00:00</StartDate>
  <CalendarUID>1</CalendarUID>
  <Calendars>
    <Calendar>
      <UID>1</UID>
      <Name>Standard</Name>
      <IsBaseCalendar>1</IsBaseCalendar>
      <WeekDays>
        <WeekDay><DayType>1</DayType><DayWorking>0</DayWorking></WeekDay>
        <WeekDay><DayType>7</DayType><DayWorking>0</DayWorking></WeekDay>
      </WeekDays>
    </Calendar>
  </Calendars>
  <Tasks>${tasksXml}
  </Tasks>
</Project>`;

  const blob = new Blob([xml], { type: 'application/xml' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dcfs-ilc-planner-${new Date().toISOString().slice(0,10)}.xml`;
  a.click();
}
function importJSON() { document.getElementById('import-file').click(); }
function toggleEffort() {
  const table = document.getElementById('gantt-table');
  table.classList.toggle('show-effort');
  const btn = document.getElementById('effort-toggle');
  btn.textContent = table.classList.contains('show-effort') ? 'Hide Effort' : 'Show Effort';
}
function resetData() {
  if (confirm('Reset ALL data to defaults? This will overwrite any changes you made.')) {
    localStorage.removeItem(STORAGE_KEY);
    data = getDefaultData();
    saveData();
    renderGantt(); renderRisks(); renderAssumptions();
    alert('Reset to default data with 9 WBS phases and 68 tasks.');
  }
}
function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      data = JSON.parse(e.target.result);
      saveData();
      renderGantt(); renderRisks(); renderAssumptions();
      alert('Imported successfully');
    } catch(err) { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
}

// ── Init ──
renderGantt();
renderRisks();
renderAssumptions();
</script>
