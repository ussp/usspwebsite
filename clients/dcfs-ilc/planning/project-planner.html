<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DCFS ILC — AI Transformation Project Planner</title>
<link rel="icon" type="image/png" href="../assets/krasan-favicon.png">
<style>
  :root { --accent: #0f3460; --highlight: #e94560; --green: #27ae60; --amber: #f39c12; --blue: #2980b9; --red: #e74c3c; --gray: #95a5a6; --light: #f8f9fa; --border: #dee2e6; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; color: #333; font-size: 14px; }

  /* Header */
  .header { background: var(--accent); color: white; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header .actions { display: flex; gap: 8px; }
  .header button { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.3); padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .header button:hover { background: rgba(255,255,255,0.25); }
  .header .version { font-size: 11px; color: rgba(255,255,255,0.6); }

  /* Tabs */
  .tabs { display: flex; background: white; border-bottom: 2px solid var(--border); padding: 0 24px; }
  .tab { padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; color: #666; }
  .tab:hover { color: var(--accent); }
  .tab.active { color: var(--accent); border-bottom-color: var(--highlight); }
  .tab .count { background: var(--highlight); color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }

  /* Content */
  .content { padding: 16px 24px; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* Gantt */
  .gantt-controls { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .gantt-controls button { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }
  .gantt-controls button:hover { opacity: 0.9; }
  .gantt-controls select, .gantt-controls input { padding: 5px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; }

  .gantt-container { overflow-x: auto; background: white; border: 1px solid var(--border); border-radius: 6px; }
  .gantt-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .gantt-table th { background: var(--accent); color: white; padding: 6px 8px; text-align: left; position: sticky; top: 0; z-index: 2; white-space: nowrap; }
  .gantt-table td { padding: 4px 8px; border-bottom: 1px solid #eee; vertical-align: middle; }
  .gantt-table tr:hover { background: #f8f9ff; }
  .gantt-table .wbs-id { font-weight: 600; color: var(--accent); width: 60px; }
  .gantt-table .task-name { min-width: 200px; }
  .gantt-table .task-name.phase { font-weight: 700; background: #f0f4ff; }
  .collapse-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: var(--accent); padding: 0 4px; }
  .gantt-table tr.collapsed-child { display: none; }
  .dep-tag { font-size: 9px; background: #e3f2fd; color: var(--blue); padding: 1px 5px; border-radius: 8px; margin-left: 4px; white-space: nowrap; }
  .gantt-table input[type="text"], .gantt-table input[type="date"], .gantt-table select { width: 100%; padding: 3px 5px; border: 1px solid transparent; border-radius: 3px; font-size: 12px; background: transparent; }
  .gantt-table input:focus, .gantt-table select:focus { border-color: var(--accent); background: white; outline: none; }
  .gantt-table textarea { width: 100%; padding: 3px 5px; border: 1px solid transparent; border-radius: 3px; font-size: 11px; resize: vertical; min-height: 20px; background: transparent; }
  .gantt-table textarea:focus { border-color: var(--accent); background: white; outline: none; }

  /* Gantt bars */
  .gantt-bar-cell { position: relative; height: 24px; }
  .gantt-bar { position: absolute; height: 18px; top: 3px; border-radius: 3px; font-size: 9px; color: white; display: flex; align-items: center; padding-left: 4px; min-width: 4px; }
  .gantt-bar.govern { background: var(--accent); }
  .gantt-bar.baseline { background: var(--blue); }
  .gantt-bar.design { background: #8e44ad; }
  .gantt-bar.train { background: var(--amber); }
  .gantt-bar.pilot { background: var(--green); }
  .gantt-bar.measure { background: var(--highlight); }
  .gantt-bar.playbook { background: #16a085; }
  .gantt-bar.scale { background: var(--gray); }
  .gantt-bar.default { background: var(--blue); }

  /* Timeline header */
  .timeline-header { display: flex; }
  .timeline-week { flex: 1; text-align: center; font-size: 10px; padding: 2px; border-left: 1px solid rgba(255,255,255,0.2); min-width: 40px; }

  /* Status badges */
  .status { padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
  .status.not-started { background: #eee; color: #666; }
  .status.in-progress { background: #e3f2fd; color: var(--blue); }
  .status.completed { background: #e8f5e9; color: var(--green); }
  .status.blocked { background: #fce4ec; color: var(--red); }

  /* Delete button */
  .btn-delete { background: none; border: none; color: #ccc; cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .btn-delete:hover { color: var(--red); }

  /* Risk & Assumptions tables */
  .log-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
  .log-table th { background: var(--accent); color: white; padding: 8px 12px; text-align: left; font-size: 12px; }
  .log-table td { padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 12px; }
  .log-table tr:hover { background: #f8f9ff; }
  .log-table input, .log-table select, .log-table textarea { width: 100%; padding: 4px 6px; border: 1px solid transparent; border-radius: 3px; font-size: 12px; background: transparent; }
  .log-table input:focus, .log-table select:focus, .log-table textarea:focus { border-color: var(--accent); background: white; outline: none; }

  .severity-critical { color: var(--red); font-weight: 700; }
  .severity-high { color: var(--amber); font-weight: 600; }
  .severity-medium { color: var(--blue); }
  .severity-low { color: var(--gray); }

  .add-row { margin-top: 8px; }
  .add-row button { background: var(--accent); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; font-size: 12px; }

  /* Notes panel */
  .notes-panel { position: fixed; right: 0; top: 0; width: 360px; height: 100vh; background: white; box-shadow: -4px 0 12px rgba(0,0,0,0.1); z-index: 100; transform: translateX(100%); transition: transform 0.2s; padding: 16px; overflow-y: auto; }
  .notes-panel.open { transform: translateX(0); }
  .notes-panel h3 { margin-bottom: 12px; color: var(--accent); }
  .notes-panel textarea { width: 100%; height: 200px; padding: 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; resize: vertical; }
  .notes-panel .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; font-size: 20px; cursor: pointer; color: #999; }

  /* Save indicator */
  .save-indicator { font-size: 11px; color: rgba(255,255,255,0.5); }
  .save-indicator.saved { color: var(--green); }

  @media print { .header, .tabs, .gantt-controls, .add-row, .btn-delete, .notes-panel { display: none !important; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>DCFS ILC — AI Transformation Project Planner</h1>
    <div class="version">V04142026 · Krasan Consulting Services</div>
  </div>
  <div class="actions">
    <span class="save-indicator" id="save-indicator">Auto-saved</span>
    <button onclick="resetData()" style="background:var(--highlight)">Reset to Default</button>
    <button onclick="exportJSON()">Export JSON</button>
    <button onclick="importJSON()">Import JSON</button>
    <button onclick="window.print()">Print</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('gantt')">Gantt / WBS</div>
  <div class="tab" onclick="switchTab('risks')">Risks <span class="count" id="risk-count">0</span></div>
  <div class="tab" onclick="switchTab('assumptions')">Assumptions <span class="count" id="assumption-count">0</span></div>
</div>

<div class="content">
  <!-- GANTT PANEL -->
  <div class="panel active" id="panel-gantt">
    <div class="gantt-controls">
      <button onclick="addTask()">+ Add Task</button>
      <button onclick="addPhase()">+ Add Phase</button>
      <select id="phase-filter" onchange="renderGantt()">
        <option value="all">All Phases</option>
        <option value="govern">Govern</option>
        <option value="baseline">Baseline</option>
        <option value="design">Design</option>
        <option value="train">Train</option>
        <option value="pilot">Pilot</option>
        <option value="measure">Measure</option>
        <option value="playbook">Playbook</option>
        <option value="scale">Scale</option>
      </select>
      <span style="color:#999;font-size:11px;">Click task name for notes</span>
    </div>
    <div class="gantt-container">
      <table class="gantt-table" id="gantt-table">
        <thead id="gantt-header"></thead>
        <tbody id="gantt-body"></tbody>
      </table>
    </div>
  </div>

  <!-- RISKS PANEL -->
  <div class="panel" id="panel-risks">
    <div class="add-row"><button onclick="addRisk()">+ Add Risk</button></div>
    <br>
    <table class="log-table">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>Risk Description</th>
          <th style="width:100px">Likelihood</th>
          <th style="width:100px">Impact</th>
          <th style="width:80px">Score</th>
          <th>Mitigation</th>
          <th style="width:100px">Owner</th>
          <th style="width:90px">Status</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody id="risks-body"></tbody>
    </table>
  </div>

  <!-- ASSUMPTIONS PANEL -->
  <div class="panel" id="panel-assumptions">
    <div class="add-row"><button onclick="addAssumption()">+ Add Assumption</button></div>
    <br>
    <table class="log-table">
      <thead>
        <tr>
          <th style="width:40px">#</th>
          <th>Assumption</th>
          <th style="width:120px">Status</th>
          <th>How to Validate</th>
          <th style="width:100px">Owner</th>
          <th>Notes</th>
          <th style="width:30px"></th>
        </tr>
      </thead>
      <tbody id="assumptions-body"></tbody>
    </table>
  </div>
</div>

<!-- Notes Side Panel -->
<div class="notes-panel" id="notes-panel">
  <button class="close-btn" onclick="closeNotes()">&times;</button>
  <h3 id="notes-title">Task Notes</h3>
  <textarea id="notes-text" onchange="saveNotes()"></textarea>
</div>

<input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)">

function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return getDefaultData();
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  const el = document.getElementById('save-indicator');
  el.textContent = 'Saved ✓';
  el.className = 'save-indicator saved';
  setTimeout(() => { el.textContent = 'Auto-saved'; el.className = 'save-indicator'; }, 2000);
}

// ── Tab switching ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['gantt','risks','assumptions'][i] === tab);
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
}

// ── Gantt Rendering ──
function getWeekDates() {
  const weeks = [];
  for (let i = 0; i < WEEKS_TO_SHOW; i++) {
    const d = new Date(PROJECT_START);
    d.setDate(d.getDate() + i * 7);
    weeks.push(d);
  }
  return weeks;
}

function daysBetween(d1, d2) {
  return Math.round((new Date(d2) - new Date(d1)) / (1000*60*60*24));
}

// Track collapsed phases
if (!data.collapsedPhases) data.collapsedPhases = {};

function toggleCollapse(phaseId) {
  data.collapsedPhases[phaseId] = !data.collapsedPhases[phaseId];
  saveData();
  renderGantt();
}

function getTaskOptions(excludeId) {
  return data.tasks.filter(t => t.id !== excludeId && !t.isPhase)
    .map(t => `<option value="${t.wbs}">${t.wbs}</option>`).join('');
}

function renderGantt() {
  const weeks = getWeekDates();
  const totalDays = WEEKS_TO_SHOW * 7;
  const filter = document.getElementById('phase-filter').value;

  // Header
  const header = document.getElementById('gantt-header');
  header.innerHTML = `<tr>
    <th style="width:50px">WBS</th>
    <th style="width:220px">Task</th>
    <th style="width:90px">Start</th>
    <th style="width:90px">End</th>
    <th style="width:70px">Depends</th>
    <th style="width:80px">Owner</th>
    <th style="width:80px">Status</th>
    <th style="min-width:${WEEKS_TO_SHOW * 40}px">
      <div class="timeline-header">${weeks.map(w => `<div class="timeline-week">${(w.getMonth()+1)}/${w.getDate()}</div>`).join('')}</div>
    </th>
    <th style="width:30px"></th>
  </tr>`;

  // Body
  const body = document.getElementById('gantt-body');
  body.innerHTML = '';
  const filteredTasks = filter === 'all' ? data.tasks : data.tasks.filter(t => t.phase === filter || t.isPhase);

  let currentPhaseId = null;

  filteredTasks.forEach((task, idx) => {
    // Track which phase we're in
    if (task.isPhase) currentPhaseId = task.id;
    const isChild = !task.isPhase;
    const isCollapsed = isChild && currentPhaseId && data.collapsedPhases[currentPhaseId];

    const tr = document.createElement('tr');
    if (isCollapsed) tr.classList.add('collapsed-child');

    const startDay = Math.max(0, daysBetween(PROJECT_START, task.start));
    const duration = Math.max(1, daysBetween(task.start, task.end));
    const barLeft = (startDay / totalDays) * 100;
    const barWidth = (duration / totalDays) * 100;
    const barClass = task.phase || 'default';

    // Collapse button for phases
    const collapseBtn = task.isPhase
      ? `<button class="collapse-btn" onclick="event.stopPropagation();toggleCollapse('${task.id}')" title="Collapse/Expand">${data.collapsedPhases[task.id] ? '▶' : '▼'}</button>`
      : '';

    // Dependencies display
    const depDisplay = task.depends
      ? `<span class="dep-tag">${task.depends}</span>`
      : '';

    tr.innerHTML = `
      <td class="wbs-id">${task.wbs}</td>
      <td class="task-name ${task.isPhase ? 'phase' : ''}" style="cursor:pointer" onclick="openNotes('${task.id}')">
        ${collapseBtn}
        <input type="text" value="${task.name}" onchange="updateTask('${task.id}','name',this.value)" style="${task.isPhase ? 'font-weight:700' : ''}; ${task.isPhase ? 'width:calc(100% - 24px);display:inline' : 'width:100%'}">
      </td>
      <td><input type="date" value="${task.start}" onchange="updateTask('${task.id}','start',this.value)"></td>
      <td><input type="date" value="${task.end}" onchange="updateTask('${task.id}','end',this.value)"></td>
      <td>${task.isPhase ? '' : `<input type="text" value="${task.depends||''}" onchange="updateTask('${task.id}','depends',this.value)" placeholder="e.g. 1.4" style="width:50px;font-size:11px" title="Enter WBS # of dependency">`}${depDisplay}</td>
      <td><input type="text" value="${task.owner}" onchange="updateTask('${task.id}','owner',this.value)" style="width:70px"></td>
      <td>
        <select onchange="updateTask('${task.id}','status',this.value)">
          <option value="not-started" ${task.status==='not-started'?'selected':''}>Not Started</option>
          <option value="in-progress" ${task.status==='in-progress'?'selected':''}>In Progress</option>
          <option value="completed" ${task.status==='completed'?'selected':''}>Completed</option>
          <option value="blocked" ${task.status==='blocked'?'selected':''}>Blocked</option>
        </select>
      </td>
      <td class="gantt-bar-cell" style="min-width:${WEEKS_TO_SHOW * 40}px; position:relative;">
        <div class="gantt-bar ${barClass}" style="left:${barLeft}%;width:${barWidth}%;" title="${task.name}: ${task.start} → ${task.end}${task.depends ? ' (depends on ' + task.depends + ')' : ''}"></div>
      </td>
      <td><button class="btn-delete" onclick="deleteTask('${task.id}')" title="Remove">&times;</button></td>
    `;
    body.appendChild(tr);
  });
}

function updateTask(id, field, value) {
  const task = data.tasks.find(t => t.id === id);
  if (task) { task[field] = value; saveData(); renderGantt(); }
}

function addTask() {
  const maxNum = data.tasks.filter(t => !t.isPhase).length + 1;
  data.tasks.push({
    id: 't' + Date.now(),
    wbs: '?.?',
    name: 'New Task',
    phase: 'govern',
    start: '2026-04-14',
    end: '2026-04-21',
    status: 'not-started',
    owner: '',
    notes: ''
  });
  saveData(); renderGantt();
}

function addPhase() {
  data.tasks.push({
    id: 'P' + Date.now(),
    wbs: '?',
    name: 'NEW PHASE',
    phase: 'govern',
    isPhase: true,
    start: '2026-04-14',
    end: '2026-04-21',
    status: 'not-started',
    owner: '',
    notes: ''
  });
  saveData(); renderGantt();
}

function deleteTask(id) {
  if (confirm('Remove this task?')) {
    data.tasks = data.tasks.filter(t => t.id !== id);
    saveData(); renderGantt();
  }
}

// ── Notes ──
let currentNotesId = null;
function openNotes(id) {
  currentNotesId = id;
  const task = data.tasks.find(t => t.id === id);
  if (!task) return;
  document.getElementById('notes-title').textContent = task.wbs + ' — ' + task.name;
  document.getElementById('notes-text').value = task.notes || '';
  document.getElementById('notes-panel').classList.add('open');
}
function closeNotes() { document.getElementById('notes-panel').classList.remove('open'); }
function saveNotes() {
  if (!currentNotesId) return;
  const task = data.tasks.find(t => t.id === currentNotesId);
  if (task) { task.notes = document.getElementById('notes-text').value; saveData(); }
}

// ── Risks ──
function renderRisks() {
  const body = document.getElementById('risks-body');
  body.innerHTML = '';
  document.getElementById('risk-count').textContent = data.risks.length;

  data.risks.forEach((r, i) => {
    const score = getLikelihoodNum(r.likelihood) * getImpactNum(r.impact);
    const scoreClass = score >= 15 ? 'severity-critical' : score >= 10 ? 'severity-high' : score >= 5 ? 'severity-medium' : 'severity-low';
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600">${r.id}</td>
      <td><textarea onchange="updateRisk(${i},'desc',this.value)">${r.desc}</textarea></td>
      <td><select onchange="updateRisk(${i},'likelihood',this.value)">
        <option ${r.likelihood==='Low'?'selected':''}>Low</option>
        <option ${r.likelihood==='Medium'?'selected':''}>Medium</option>
        <option ${r.likelihood==='High'?'selected':''}>High</option>
        <option ${r.likelihood==='Unknown'?'selected':''}>Unknown</option>
      </select></td>
      <td><select onchange="updateRisk(${i},'impact',this.value)">
        <option ${r.impact==='Low'?'selected':''}>Low</option>
        <option ${r.impact==='Medium'?'selected':''}>Medium</option>
        <option ${r.impact==='High'?'selected':''}>High</option>
        <option ${r.impact==='Critical'?'selected':''}>Critical</option>
      </select></td>
      <td class="${scoreClass}" style="text-align:center;font-size:16px">${score}</td>
      <td><textarea onchange="updateRisk(${i},'mitigation',this.value)">${r.mitigation}</textarea></td>
      <td><input type="text" value="${r.owner}" onchange="updateRisk(${i},'owner',this.value)"></td>
      <td><select onchange="updateRisk(${i},'status',this.value)">
        <option ${r.status==='open'?'selected':''}>open</option>
        <option ${r.status==='mitigated'?'selected':''}>mitigated</option>
        <option ${r.status==='closed'?'selected':''}>closed</option>
        <option ${r.status==='accepted'?'selected':''}>accepted</option>
      </select></td>
      <td><button class="btn-delete" onclick="deleteRisk(${i})">&times;</button></td>
    `;
    body.appendChild(tr);
  });
}

function getLikelihoodNum(l) { return {Low:1,Medium:3,High:5,Unknown:3}[l]||3; }
function getImpactNum(i) { return {Low:1,Medium:3,High:5,Critical:7}[i]||3; }

function updateRisk(idx, field, value) { data.risks[idx][field] = value; saveData(); renderRisks(); }
function addRisk() {
  data.risks.push({ id: 'R' + (data.risks.length + 1).toString().padStart(2,'0'), desc: '', likelihood: 'Medium', impact: 'Medium', mitigation: '', owner: '', status: 'open' });
  saveData(); renderRisks();
}
function deleteRisk(idx) { if (confirm('Remove this risk?')) { data.risks.splice(idx, 1); saveData(); renderRisks(); } }

// ── Assumptions ──
function renderAssumptions() {
  const body = document.getElementById('assumptions-body');
  body.innerHTML = '';
  document.getElementById('assumption-count').textContent = data.assumptions.length;

  data.assumptions.forEach((a, i) => {
    const statusColors = { validated: 'color:var(--green)', unvalidated: 'color:var(--red)', pending: 'color:var(--amber)', assumed: 'color:var(--blue)', unknown: 'color:var(--gray)' };
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="font-weight:600">${a.id}</td>
      <td><textarea onchange="updateAssumption(${i},'desc',this.value)">${a.desc}</textarea></td>
      <td><select style="${statusColors[a.status]||''};font-weight:600" onchange="updateAssumption(${i},'status',this.value)">
        <option value="validated" ${a.status==='validated'?'selected':''}>Validated</option>
        <option value="unvalidated" ${a.status==='unvalidated'?'selected':''}>Unvalidated</option>
        <option value="pending" ${a.status==='pending'?'selected':''}>Pending</option>
        <option value="assumed" ${a.status==='assumed'?'selected':''}>Assumed</option>
        <option value="unknown" ${a.status==='unknown'?'selected':''}>Unknown</option>
      </select></td>
      <td><textarea onchange="updateAssumption(${i},'validate',this.value)">${a.validate}</textarea></td>
      <td><input type="text" value="${a.owner}" onchange="updateAssumption(${i},'owner',this.value)"></td>
      <td><textarea onchange="updateAssumption(${i},'notes',this.value)">${a.notes||''}</textarea></td>
      <td><button class="btn-delete" onclick="deleteAssumption(${i})">&times;</button></td>
    `;
    body.appendChild(tr);
  });
}

function updateAssumption(idx, field, value) { data.assumptions[idx][field] = value; saveData(); renderAssumptions(); }
function addAssumption() {
  data.assumptions.push({ id: 'A' + (data.assumptions.length + 1).toString().padStart(2,'0'), desc: '', status: 'assumed', validate: '', owner: '', notes: '' });
  saveData(); renderAssumptions();
}
function deleteAssumption(idx) { if (confirm('Remove this assumption?')) { data.assumptions.splice(idx, 1); saveData(); renderAssumptions(); } }

// ── Export / Import ──
function exportJSON() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dcfs-ilc-planner-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
function importJSON() { document.getElementById('import-file').click(); }
function resetData() {
  if (confirm('Reset ALL data to defaults? This will overwrite any changes you made.')) {
    localStorage.removeItem(STORAGE_KEY);
    data = getDefaultData();
    saveData();
    renderGantt(); renderRisks(); renderAssumptions();
    alert('Reset to default data with 9 WBS phases and 68 tasks.');
  }
}
function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      data = JSON.parse(e.target.result);
      saveData();
      renderGantt(); renderRisks(); renderAssumptions();
      alert('Imported successfully');
    } catch(err) { alert('Invalid JSON file'); }
  };
  reader.readAsText(file);
}

// ── Init ──
renderGantt();
renderRisks();
renderAssumptions();
</script>
</body>
</html>
