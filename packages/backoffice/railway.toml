[build]
buildCommand = "cd packages/platform-core && npx tsc && cd ../backoffice && next build"
watchPatterns = ["packages/platform-core/src/**", "packages/backoffice/**"]

[deploy]
startCommand = "cd packages/backoffice && npm run start"
healthcheckPath = "/login"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
