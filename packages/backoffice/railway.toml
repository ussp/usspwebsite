[build]
buildCommand = "cd packages/openspecmatch && npx tsc && cd ../platform-core && npx tsc && cd ../backoffice && next build"
watchPatterns = ["packages/platform-core/src/**", "packages/backoffice/**", "packages/backoffice/railway.toml"]

[deploy]
startCommand = "cd packages/backoffice && npm run start"
healthcheckPath = "/login"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
