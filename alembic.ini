# Alembic Configuration for Supabase PostgreSQL
#
# This file configures Alembic database migrations for the USSP website.
# Migrations manage the Supabase PostgreSQL schema (positions, applications).

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Truncate revision labels to 12 chars for filenames
truncate_slug_length = 40

# SQLAlchemy URL - populated from environment variable
# Use: DATABASE_URL environment variable
# Format: postgresql://user:password@host:port/dbname
sqlalchemy.url = driver://user:pass@localhost/dbname

# Timezone for migrations
timezone = UTC

# Version table name
version_table = alembic_version_ussp

# Version table schema (use public for Supabase)
version_table_schema = public

# Prepend sys.path with the current directory
prepend_sys_path = .

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
